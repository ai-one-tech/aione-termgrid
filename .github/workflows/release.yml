name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Determine Version and Tag
        id: vars
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            FINAL_TAG="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            FINAL_TAG="${{ github.event.inputs.tag }}"
          else
            FINAL_TAG="v$PACKAGE_VERSION"
          fi
          echo "tag=$FINAL_TAG" >> $GITHUB_OUTPUT
          echo "Computed Tag: $FINAL_TAG"

      - name: Install dependencies
        run: npm ci

      - name: Package and Publish to VS Code Marketplace (AiOne)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VERSION=$(jq -r .version package.json)
          rm -rf out dist
          npx vsce package --out termgrid-vsce-$VERSION.vsix
          npx vsce publish --packagePath termgrid-vsce-$VERSION.vsix -p $VSCE_PAT

      - name: Package and Publish to Open VSX (AiOneTech)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VERSION=$(jq -r .version package.json)
          # 将 package.json 中的 publisher 替换为 AiOneTech
          jq '.publisher = "AiOneTech"' package.json > package.json.tmp && mv package.json.tmp package.json
          # 清理上次构建产物
          rm -rf out dist
          npx vsce package --out termgrid-ovsx-$VERSION.vsix
          npx ovsx publish termgrid-ovsx-$VERSION.vsix -p $OVSX_PAT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: "*.vsix"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

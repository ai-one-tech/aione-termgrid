name: Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，例如 v1.0.0

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          rm -rf out dist
          npm run vscode:prepublish
          # 验证构建产物是否存在
          ls -R out/
          ls -R dist/

      - name: Package and Publish to VS Code Marketplace (AiOne)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VERSION=$(jq -r .version package.json)
          npx vsce package --no-prepublish --out termgrid-vsce-$VERSION.vsix
          npx vsce publish --packagePath termgrid-vsce-$VERSION.vsix -p $VSCE_PAT

      - name: Package and Publish to Open VSX (AiOneTech)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VERSION=$(jq -r .version package.json)
          # 将 package.json 中的 publisher 替换为 AiOneTech
          jq '.publisher = "AiOneTech"' package.json > package.json.tmp && mv package.json.tmp package.json
          # 使用 --no-prepublish 直接打包已编译好的代码
          npx vsce package --no-prepublish --out termgrid-ovsx-$VERSION.vsix
          npx ovsx publish termgrid-ovsx-$VERSION.vsix -p $OVSX_PAT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: "*.vsix"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_vscode:
        description: 'Publish to VS Code Marketplace'
        type: boolean
        default: true
      publish_openvsx:
        description: 'Publish to Open VSX'
        type: boolean
        default: true
      publish_jetbrains:
        description: 'Publish to JetBrains Marketplace'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Determine Version and Tag
        id: vars
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            FINAL_TAG="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            FINAL_TAG="${{ github.event.inputs.tag }}"
          else
            FINAL_TAG="v$PACKAGE_VERSION"
          fi
          echo "tag=$FINAL_TAG" >> $GITHUB_OUTPUT
          echo "Computed Tag: $FINAL_TAG"

      - name: Install dependencies
        run: npm ci

      - name: Package and Publish to VS Code Marketplace (AiOne)
        if: github.event_name == 'push' || inputs.publish_vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VERSION=$(jq -r .version package.json)
          rm -rf out dist
          npx vsce package --out termgrid-vsce-$VERSION.vsix
          npx vsce publish --packagePath termgrid-vsce-$VERSION.vsix -p $VSCE_PAT

      - name: Package and Publish to Open VSX (AiOneTech)
        if: github.event_name == 'push' || inputs.publish_openvsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VERSION=$(jq -r .version package.json)
          # 将 package.json 中的 publisher 替换为 AiOneTech
          jq '.publisher = "AiOneTech"' package.json > package.json.tmp && mv package.json.tmp package.json
          # 清理上次构建产物
          rm -rf out dist
          npx vsce package --out termgrid-ovsx-$VERSION.vsix
          npx ovsx publish termgrid-ovsx-$VERSION.vsix -p $OVSX_PAT

      - name: Set up JDK 17
        if: github.event_name == 'push' || inputs.publish_jetbrains
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Package and Publish to JetBrains Marketplace
        if: github.event_name == 'push' || inputs.publish_jetbrains
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: |
          npm run build:webview
          cd jetbrains-plugin
          ./gradlew buildPlugin publishPlugin

      - name: Collect release artifacts
        id: artifacts
        run: |
          FILES=""
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ inputs.publish_vscode }}" == "true" ]; then
            FILES="$FILES termgrid-vsce-*.vsix"
          fi
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ inputs.publish_openvsx }}" == "true" ]; then
            FILES="$FILES termgrid-ovsx-*.vsix"
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Release files: $FILES"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: success() && steps.artifacts.outputs.files != ''
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: ${{ steps.artifacts.outputs.files }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

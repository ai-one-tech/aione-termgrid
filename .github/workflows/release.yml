name: Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，例如 v1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Package
        run: npm run vsix

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: success()
        run: npx vsce publish --packagePath $(ls *.vsix) -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: success()
        run: |
          # 将 package.json 中的 publisher 替换为 AiOneTech
          jq '.publisher = "AiOneTech"' package.json > package.json.tmp && mv package.json.tmp package.json
          
          # 重新打包生成适用于 Open VSX 的 vsix
          npx vsce package --out aionetech-termgrid.vsix
          
          # 发布到 Open VSX
          npx ovsx publish aionetech-termgrid.vsix -p ${{ secrets.OVSX_PAT }}
